<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrooveGO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="dark"] {
      --bg:          #0d0f16;
      --sidebar-bg:  #111420;
      --surface:     #161923;
      --surface2:    #1e2130;
      --border:      #252838;
      --accent:      #7c6af7;
      --accent-h:    #9d8fff;
      --text:        #e2e8f0;
      --muted:       #5a6380;
      --me:          #a78bfa;
      --peer:        #38bdf8;
      --system:      #64748b;
      --success:     #4ade80;
      --danger:      #f87171;
      --file-bg:     #1e2a1e;
      --file-border: #2d4a2d;
      --ch-active:   #252838;
      --ch-hover:    #1e2130;
      --shadow:      0 2px 12px rgba(0,0,0,.4);
    }
    [data-theme="light"] {
      --bg:          #f0f2f8;
      --sidebar-bg:  #e8eaf4;
      --surface:     #ffffff;
      --surface2:    #f7f8fc;
      --border:      #dde1ef;
      --accent:      #6d5ce7;
      --accent-h:    #5848cc;
      --text:        #1e2130;
      --muted:       #7c85a2;
      --me:          #6d5ce7;
      --peer:        #0284c7;
      --system:      #94a3b8;
      --success:     #16a34a;
      --danger:      #dc2626;
      --file-bg:     #f0fdf0;
      --file-border: #bbf7d0;
      --ch-active:   #dde1ef;
      --ch-hover:    #e8eaf4;
      --shadow:      0 2px 12px rgba(0,0,0,.1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      transition: background .25s, color .25s;
    }

    /* ── App shell: sidebar + main ── */
    .app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      min-width: 200px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 14px 8px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-add {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.1rem; line-height: 1;
      padding: 2px 4px; border-radius: 4px;
      transition: color .15s, background .15s;
    }
    .sidebar-add:hover { color: var(--accent); background: var(--ch-hover); }

    .channel-list {
      flex: 1; overflow-y: auto; padding: 0 6px 8px;
    }
    .channel-list::-webkit-scrollbar { width: 4px; }
    .channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .channel-item {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 10px; border-radius: 8px;
      cursor: pointer; font-size: .88rem; color: var(--muted);
      transition: background .12s, color .12s;
      user-select: none;
    }
    .channel-item:hover { background: var(--ch-hover); color: var(--text); }
    .channel-item.active {
      background: var(--ch-active); color: var(--text); font-weight: 600;
    }
    .channel-item.active .ch-hash { color: var(--accent); }
    .ch-hash { font-weight: 700; color: var(--muted); font-size: .9rem; }
    .ch-unread {
      margin-left: auto; background: var(--accent);
      color: #fff; font-size: .65rem; font-weight: 700;
      border-radius: 10px; padding: 1px 6px; min-width: 18px;
      text-align: center; display: none;
    }
    .ch-unread.show { display: block; }

    /* New channel form */
    .new-channel-form {
      display: none; padding: 8px 10px; gap: 6px;
      border-top: 1px solid var(--border);
    }
    .new-channel-form.open { display: flex; }

    /* Online users panel */
    .online-section {
      border-top: 1px solid var(--border);
      padding: 10px 6px 8px;
      flex-shrink: 0;
    }
    .online-header {
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); padding: 0 8px 6px;
    }
    .online-user {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px; font-size: .82rem; color: var(--muted);
      border-radius: 8px;
    }
    .online-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success); flex-shrink: 0;
    }
    .online-empty { font-size: .78rem; color: var(--muted); padding: 4px 10px; }
    .new-channel-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .85rem;
      padding: 6px 10px; outline: none;
      transition: border-color .2s;
    }
    .new-channel-input:focus { border-color: var(--accent); }
    .new-channel-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 6px 12px; font-size: .8rem;
      font-weight: 600; cursor: pointer; transition: opacity .2s;
    }
    .new-channel-btn:hover { opacity: .85; }

    /* ── Main area ── */
    .main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center;
      padding: 0 20px; height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow); flex-shrink: 0; gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 30px; height: 30px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .logo-text { font-size: 1rem; font-weight: 700; color: var(--text); }
    .logo-text span { color: var(--accent); }
    #ws-name {
      font-size: .85rem; font-weight: 700; color: var(--accent);
    }
    .header-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    #peers-badge {
      font-size: .75rem; font-weight: 500; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 12px; transition: color .2s;
    }
    #peers-badge.has-peers { color: var(--success); border-color: var(--success); }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--danger); transition: background .3s; flex-shrink: 0;
    }
    #status-dot.connected { background: var(--success); }
    #theme-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); cursor: pointer;
      font-size: 1rem; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      transition: color .2s, border-color .2s;
    }
    #theme-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Drop overlay ── */
    #drop-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      border: 3px dashed var(--accent);
      align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 600; color: var(--accent);
      pointer-events: none;
    }
    body.dragging #drop-overlay { display: flex; }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 2px;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      display: grid; grid-template-columns: 42px 90px 1fr;
      align-items: baseline; gap: 0 8px;
      padding: 4px 8px; border-radius: 8px; transition: background .12s;
    }
    .msg:hover { background: var(--surface2); }
    .msg.self   .sender { color: var(--me); }
    .msg.peer   .sender { color: var(--peer); }
    .msg.system .sender { color: var(--system); font-style: italic; }
    .timestamp { font-size: .7rem; color: var(--muted); text-align: right; white-space: nowrap; }
    .sender { font-weight: 600; font-size: .82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .body { font-size: .9rem; word-break: break-word; line-height: 1.5; }

    /* ── File bubble ── */
    .file-bubble {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--file-bg); border: 1px solid var(--file-border);
      border-radius: 10px; padding: 8px 14px; margin-top: 2px; max-width: 320px;
    }
    .file-icon { font-size: 1.4rem; flex-shrink: 0; }
    .file-info { display: flex; flex-direction: column; min-width: 0; }
    .file-name { font-size: .85rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: .72rem; color: var(--muted); }
    .file-dl {
      margin-left: auto; flex-shrink: 0;
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 5px 12px; font-size: .8rem;
      font-weight: 600; cursor: pointer; text-decoration: none;
      transition: opacity .2s;
    }
    .file-dl:hover { opacity: .85; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: .7rem;
      text-transform: uppercase; letter-spacing: .06em; margin: 10px 8px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    #empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); gap: 8px; font-size: .9rem; user-select: none;
    }
    #empty .icon { font-size: 2.5rem; opacity: .4; }

    /* ── Upload progress ── */
    #upload-bar {
      display: none; align-items: center; gap: 10px;
      padding: 6px 20px; background: var(--surface2);
      border-top: 1px solid var(--border); font-size: .8rem; color: var(--muted);
    }
    #upload-bar.active { display: flex; }
    #upload-progress { flex: 1; height: 4px; border-radius: 2px; accent-color: var(--accent); }

    /* ── Input bar ── */
    footer {
      padding: 12px 20px; background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; flex-shrink: 0; align-items: center;
    }
    #attach-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--muted); cursor: pointer;
      font-size: 1.1rem; width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      transition: color .2s, border-color .2s; flex-shrink: 0;
    }
    #attach-btn:hover { color: var(--accent); border-color: var(--accent); }
    #file-input { display: none; }
    #input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: .92rem;
      padding: 10px 16px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }
    #input::placeholder { color: var(--muted); }
    #send {
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; padding: 10px 22px; font-size: .9rem;
      font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background .2s, transform .1s;
    }
    #send:hover:not(:disabled) { background: var(--accent-h); }
    #send:active:not(:disabled) { transform: scale(.97); }
    #send:disabled { opacity: .35; cursor: default; }

    /* ── Responsive: hide sidebar on small screens ── */
    @media (max-width: 540px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<div id="drop-overlay">📎 Drop file to send</div>

<div class="app">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      Channels
      <button class="sidebar-add" id="add-ch-btn" title="New channel">＋</button>
    </div>
    <div class="channel-list" id="channel-list"></div>
    <!-- Online users -->
    <div class="online-section" id="online-section">
      <div class="online-header">Online</div>
      <div id="online-list"><div class="online-empty">No peers yet</div></div>
    </div>

    <div class="new-channel-form" id="new-ch-form">
      <input class="new-channel-input" id="new-ch-input" placeholder="channel-name" maxlength="32" />
      <button class="new-channel-btn" id="new-ch-submit">Join</button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <header>
      <div class="logo">
        <div class="logo-icon">🎵</div>
        <span class="logo-text">Groove<span>GO</span></span>
      </div>
      <span id="ws-name">#general</span>
      <div class="header-right">
        <div id="peers-badge">0 peers</div>
        <div id="status-dot"></div>
        <button id="theme-btn" title="Toggle light/dark">🌙</button>
      </div>
    </header>

    <div id="upload-bar">
      <span id="upload-label">Uploading…</span>
      <progress id="upload-progress" max="100" value="0"></progress>
    </div>

    <div id="messages">
      <div id="empty">
        <div class="icon">💬</div>
        <div>No messages yet — say hello or drop a file!</div>
      </div>
    </div>

    <footer>
      <button id="attach-btn" title="Send a file">📎</button>
      <input id="file-input" type="file" />
      <input id="input" type="text" placeholder="Type a message…" autocomplete="off" />
      <button id="send" disabled>Send</button>
    </footer>
  </div>
</div>

<script>
  const messagesEl   = document.getElementById('messages');
  const inputEl      = document.getElementById('input');
  const sendBtn      = document.getElementById('send');
  const dot          = document.getElementById('status-dot');
  const peersBadge   = document.getElementById('peers-badge');
  const wsNameEl     = document.getElementById('ws-name');
  const themeBtn     = document.getElementById('theme-btn');
  const html         = document.documentElement;
  const attachBtn    = document.getElementById('attach-btn');
  const fileInput    = document.getElementById('file-input');
  const uploadBar    = document.getElementById('upload-bar');
  const uploadLabel  = document.getElementById('upload-label');
  const uploadProg   = document.getElementById('upload-progress');
  const channelList  = document.getElementById('channel-list');
  const addChBtn     = document.getElementById('add-ch-btn');
  const newChForm    = document.getElementById('new-ch-form');
  const newChInput   = document.getElementById('new-ch-input');
  const newChSubmit  = document.getElementById('new-ch-submit');

  let selfID       = '';
  let activeChannel = 'general';
  // per-channel message counts (for empty state)
  const channelMsgs = {};

  // ── Theme ──────────────────────────────────────────────────────────────────
  setTheme(localStorage.getItem('groove-theme') || 'dark');
  themeBtn.addEventListener('click', () =>
    setTheme(html.dataset.theme === 'dark' ? 'light' : 'dark'));
  function setTheme(t) {
    html.dataset.theme = t;
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('groove-theme', t);
  }

  // ── WebSocket ──────────────────────────────────────────────────────────────
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${proto}://${location.host}/ws?workspace=${encodeURIComponent(activeChannel)}`;
  const ws    = new WebSocket(wsUrl);

  ws.onopen = () => {
    dot.classList.add('connected');
    sendBtn.disabled = false;
    addSystem('Connected to node');
  };
  ws.onclose = () => {
    dot.classList.remove('connected');
    sendBtn.disabled = true;
    addSystem('Disconnected — refresh to reconnect');
  };
  ws.onerror = () => addSystem('WebSocket error');

  ws.onmessage = (evt) => {
    const env = JSON.parse(evt.data);

    if (env.type === 'init') {
      selfID = env.self_id;
      activeChannel = env.workspace;
      wsNameEl.textContent = '#' + env.workspace;
      clearMessages();
      if (env.history && env.history.length > 0) {
        addDivider(`${env.history.length} previous message${env.history.length !== 1 ? 's' : ''}`);
        env.history.forEach(m => addMessage(m, env.workspace));
        addDivider('live');
      }
      if (env.workspaces) updateSidebar(env.workspaces, env.workspace);
      return;
    }
    if (env.type === 'workspaces') {
      updateSidebar(env.workspaces, activeChannel);
      return;
    }
    if (env.type === 'peers') {
      if (env.workspace === activeChannel) {
        const n = env.count;
        peersBadge.textContent = `${n} peer${n !== 1 ? 's' : ''}`;
        peersBadge.classList.toggle('has-peers', n > 0);
        updateOnline(env.online || []);
      }
      return;
    }
    if (env.type === 'message') {
      if (env.workspace === activeChannel) {
        addMessage(env.message, env.workspace);
      } else {
        // Show unread badge on other channel
        bumpUnread(env.workspace);
      }
    }
  };

  // ── Sidebar ────────────────────────────────────────────────────────────────
  function updateSidebar(channels, active) {
    // preserve unread counts
    const existing = {};
    channelList.querySelectorAll('.channel-item').forEach(el => {
      const badge = el.querySelector('.ch-unread');
      existing[el.dataset.ch] = badge ? parseInt(badge.textContent) || 0 : 0;
    });
    channelList.innerHTML = '';
    const sorted = [...new Set(channels)].sort();
    sorted.forEach(name => {
      const item = document.createElement('div');
      item.className = 'channel-item' + (name === active ? ' active' : '');
      item.dataset.ch = name;
      const unread = existing[name] || 0;
      item.innerHTML =
        `<span class="ch-hash">#</span>${escHtml(name)}` +
        `<span class="ch-unread${unread > 0 ? ' show' : ''}">${unread}</span>`;
      item.addEventListener('click', () => joinChannel(name));
      channelList.appendChild(item);
    });
  }

  function bumpUnread(channelName) {
    const item = channelList.querySelector(`[data-ch="${CSS.escape(channelName)}"]`);
    if (!item) return;
    const badge = item.querySelector('.ch-unread');
    const cur = parseInt(badge.textContent) || 0;
    badge.textContent = cur + 1;
    badge.classList.add('show');
  }

  function joinChannel(name) {
    if (name === activeChannel) return;
    ws.send(JSON.stringify({ type: 'join', workspace: name }));
    // Optimistically mark active in sidebar
    channelList.querySelectorAll('.channel-item').forEach(el => {
      el.classList.toggle('active', el.dataset.ch === name);
    });
    // Clear unread for this channel
    const item = channelList.querySelector(`[data-ch="${CSS.escape(name)}"]`);
    if (item) {
      const badge = item.querySelector('.ch-unread');
      badge.textContent = '0';
      badge.classList.remove('show');
    }
  }

  // New channel form
  addChBtn.addEventListener('click', () => {
    newChForm.classList.toggle('open');
    if (newChForm.classList.contains('open')) newChInput.focus();
  });
  newChSubmit.addEventListener('click', createChannel);
  newChInput.addEventListener('keydown', e => { if (e.key === 'Enter') createChannel(); });
  function createChannel() {
    const name = newChInput.value.trim().toLowerCase().replace(/[^a-z0-9-_]/g, '-');
    if (!name) return;
    newChInput.value = '';
    newChForm.classList.remove('open');
    joinChannel(name);
  }

  // ── Messages ───────────────────────────────────────────────────────────────
  function clearMessages() {
    messagesEl.innerHTML = '<div id="empty"><div class="icon">💬</div><div>No messages yet — say hello or drop a file!</div></div>';
    channelMsgs[activeChannel] = 0;
  }

  function addMessage(m, forChannel) {
    const emptyEl = document.getElementById('empty');
    if (emptyEl) emptyEl.remove();

    const isSelf = m.from === selfID;
    const row    = document.createElement('div');
    row.className = `msg ${isSelf ? 'self' : 'peer'}`;

    const time = new Date(m.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    let bodyHtml;

    if (m.msg_type === 'file' && m.file_id) {
      const dlUrl = `/files/${m.file_id}/${encodeURIComponent(m.file_name)}`;
      bodyHtml =
        `<div class="file-bubble">` +
          `<span class="file-icon">${fileIcon(m.file_mime || '')}</span>` +
          `<div class="file-info">` +
            `<span class="file-name" title="${escHtml(m.file_name)}">${escHtml(m.file_name)}</span>` +
            `<span class="file-meta">${humanSize(m.file_size)}</span>` +
          `</div>` +
          `<a class="file-dl" href="${dlUrl}" download="${escHtml(m.file_name)}">⬇ Save</a>` +
        `</div>`;
    } else {
      bodyHtml = escHtml(m.body);
    }

    row.innerHTML =
      `<span class="timestamp">${time}</span>` +
      `<span class="sender">${isSelf ? 'me' : shortID(m.from)}</span>` +
      `<span class="body">${bodyHtml}</span>`;

    messagesEl.appendChild(row);
    scrollBottom();
  }

  function addSystem(text) {
    const row = document.createElement('div');
    row.className = 'msg system';
    row.innerHTML =
      `<span class="timestamp"></span>` +
      `<span class="sender">—</span>` +
      `<span class="body">${escHtml(text)}</span>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function addDivider(label) {
    const d = document.createElement('div');
    d.className = 'divider';
    d.textContent = label;
    messagesEl.appendChild(d);
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  // ── Send ───────────────────────────────────────────────────────────────────
  function send() {
    const text = inputEl.value.trim();
    if (!text || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'send', body: text }));
    inputEl.value = '';
  }
  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  // ── File upload ────────────────────────────────────────────────────────────
  attachBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) uploadFile(fileInput.files[0]);
    fileInput.value = '';
  });

  function uploadFile(file) {
    if (file.size > 10 * 1024 * 1024) {
      addSystem(`❌ File too large: ${humanSize(file.size)} (max 10 MB)`);
      return;
    }
    const form = new FormData();
    form.append('file', file);

    uploadLabel.textContent = `Uploading ${file.name}…`;
    uploadProg.value = 0;
    uploadBar.classList.add('active');

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `/upload?workspace=${encodeURIComponent(activeChannel)}`);
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) uploadProg.value = (e.loaded / e.total) * 100;
    };
    xhr.onload = () => {
      uploadBar.classList.remove('active');
      if (xhr.status === 200) {
        const res = JSON.parse(xhr.responseText);
        addMessage({
          from: selfID, workspace: activeChannel,
          body: `📎 ${res.file_name}`, ts: new Date().toISOString(),
          msg_type: 'file', file_id: res.file_id,
          file_name: res.file_name, file_mime: res.mime, file_size: res.file_size,
        }, activeChannel);
      } else {
        addSystem(`❌ Upload failed: ${xhr.responseText}`);
      }
    };
    xhr.onerror = () => {
      uploadBar.classList.remove('active');
      addSystem('❌ Upload error');
    };
    xhr.send(form);
  }

  // ── Drag & drop ────────────────────────────────────────────────────────────
  let dragCount = 0;
  document.addEventListener('dragenter', e => {
    if (e.dataTransfer.types.includes('Files')) { dragCount++; document.body.classList.add('dragging'); }
  });
  document.addEventListener('dragleave', () => {
    if (--dragCount <= 0) { dragCount = 0; document.body.classList.remove('dragging'); }
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault(); dragCount = 0; document.body.classList.remove('dragging');
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
  });

  // ── Helpers ────────────────────────────────────────────────────────────────
  // ── Online users ───────────────────────────────────────────────────────────
  const onlineList = document.getElementById('online-list');
  function updateOnline(peers) {
    if (peers.length === 0) {
      onlineList.innerHTML = '<div class="online-empty">No peers yet</div>';
      return;
    }
    onlineList.innerHTML = peers.map(id =>
      `<div class="online-user"><span class="online-dot"></span>${escHtml(id)}</div>`
    ).join('');
  }

  function shortID(id) { return id.length > 12 ? id.slice(0, 12) : id; }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function humanSize(b) {
    if (b >= 1048576) return (b/1048576).toFixed(1) + ' MB';
    if (b >= 1024)    return (b/1024).toFixed(1) + ' KB';
    return b + ' B';
  }
  function fileIcon(mime) {
    if (mime.startsWith('image/'))  return '🖼️';
    if (mime.startsWith('video/'))  return '🎬';
    if (mime.startsWith('audio/'))  return '🎵';
    if (mime.includes('pdf'))       return '📄';
    if (mime.includes('zip') || mime.includes('compressed')) return '🗜️';
    return '📎';
  }
</script>
</body>
</html>
